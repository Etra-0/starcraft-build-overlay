version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    commit-message:
      prefix: deps
      include: scope
    groups:
      dev-tooling:
        patterns:
          - "@types/*"
          - "typescript"
          - "@typescript-eslint/*"
          - "eslint"
          - "eslint-config-*"
          - "prettier"
          - "esbuild"
      tauri-js:
        patterns:
          - "@tauri-apps/*"
  - package-ecosystem: cargo
    directory: "/src-tauri"
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 5
    labels: ["dependencies", "rust"]
    commit-message:
      prefix: deps
      include: scope
    groups:
      tauri:
        patterns:
          - "tauri*"
          - "tauri-plugin-*"
      serde-tokio:
        patterns:
          - "serde*"
          - "tokio*"
          - "reqwest"
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    labels: ["dependencies", "github-actions"]
    commit-message:
      prefix: ci
      include: scope
